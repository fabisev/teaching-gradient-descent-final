# $env:BASE_URL = "/teaching-gradient-descent-final"
version: 1
project:
  title: "Teaching ML Fundamentals: Gradient Descent"
  description: An open interactive textbook chapter sequence for teaching beginner-level gradient descent through classic and multimodal explanations.
  keywords: [Gradient Descent, Machine Learning, Multiple Modalities, Open Education, TU Delft]

  github: https://github.com/fabisev/teaching-gradient-descent-final
  thumbnail: style/thumbnail.jpg
  numbering: 
    title: true
  # specify authors in authors.yml file

  # used to load /reuse materials from other repositories
  references:
    myst-guide: https://mystmd.org/guide
    
  # project notes and legacy scaffold pages are kept on disk but excluded from the built book
  exclude: 
    - errorlog.md 
    - README.md
    - content/Cheatsheet.md
    - content/Index.md
    - content/Quickstart.md
    - content/Introduction.md
    - content/Theory.md
    - content/Methods.md
    - content/Results.ipynb
    - content/Conclusion.md

  # include a bibliography file for references in the project  
  bibliography:
    - references.bib
  
  # setup for interactivity with Thebe and Binder
  jupyter:
    binder:
      repo: https://github.com/executablebooks/thebe-binder-base

  plugins:
    - https://github.com/jupyter-book/myst-plugins/releases/download/iframe-to-qr-pdf/iframe-to-qr-pdf.mjs
    - plugins/local-html-iframe.mjs
    - plugins/typst_conversion-support.mjs
    - plugins/lightbox.mjs
    

extends:
  - toc.yml             # includes table of contents
  - export typst.yml    # includes export configurations
  - authors.yml         # includes author and contributor information
  - options.yml         # includes project-specific options and metadata
  
site:
  template: book-theme

  # styling options with logo's and custom css
  options:
    favicon:      style/favicon.ico
    logo:         style/tudelft.png
    logo_dark:    style/tudelft-dark.png
    logo_url:     https://jboss.tudelft.nl
    hide_authors: true
    style:        style/custom.css
  
  # include links to downloads
  actions:
    - title:      PDF
      url:        ./exports/report_tex.pdf
  
  # custom parts
  parts:
    footer:       style/footer.md
    banner:       "Teaching ML Fundamentals: Gradient Descent"

# 
